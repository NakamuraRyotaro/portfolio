name: Deploy

# main への push で本番(prod)へ自動デプロイ。手動実行も可能。
on:
  push:
    branches: [main]
  workflow_dispatch:

# 同時デプロイを防ぐ (SST のロック衝突対策)
concurrency:
  group: deploy-prod
  cancel-in-progress: false

permissions:
  id-token: write # OIDC で AWS ロールを引き受けるために必須
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::554443241135:role/github-actions-portfolio-deploy
          aws-region: ap-northeast-1

      - name: Deploy (SST / OpenNext)
        run: npx sst deploy --stage prod
